<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celulares</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/magalu-logo.png">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <h1>Parceiro Magalu</h1>
            </div>

            <div class="menu">
                <nav>
                    <ul class="leftside">
                        <li><a href="">Inicio</a></li>
                        <li><a href="">Carrinho</a></li>
                        <li><a href="">Contato</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="product-grid">
                <div class="product-item">
                    <div class="photo">
                        <img src="https://m.magazineluiza.com.br/a-static/420x420/smartphone-motorola-moto-g35-256gb-cinza-5g-4gb-ram-8gb-ram-boost-5g-67-cam-dupla-selfie-16mp/magazineluiza/238760500/46dade7426c642fa2bf55ac282ae40b2.jpg" alt="photo">
                    </div>

                    <div class="info">
                        <div class="product-name">
                            <h1>
                                Smartphone Motorola Moto G35 256GB Cinza 5G 4GB RAM + 8GB RAM Boost 5G 6,7" Câmera Dupla + Selfie 16MP
                            </h1>
                        </div>

                        <div class="product-price">
                            <h2>R$ 1.098,90</h2>
                        </div>

                        <button id="btn-motorola">Compre agora nessa poha</button>
                    </div>

                </div>
            </div>
        </div>
    </main>
    
</body>
</html>
