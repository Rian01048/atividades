<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <title>Calculadora</title>
</head>
<body>

    <div class="container">
        <div class="title">
            <h1>Calculadora</h1>
        </div>

        <div class="inserir-dado">
            <form>
                <label for="num">Digite algum número para a tabuada: </label>
                <input type="number" name="num" id="num">

                <button onclick="calcularSoma(event)"></button>
                <button onclick="calcularMultiplicacao(event)"></button>
            </form>

            <div id="resultado"></div>
            <script src="script.js"></script>
        </div>
    </div>

</body>
</html>
